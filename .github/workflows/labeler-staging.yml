name: "Labels: Branch staging"

concurrency:
  group: labels
  cancel-in-progress: false
  queue: max

on:
  pull_request_target:
    types:
      - opened
    branches:
      - 'staging'

jobs:
  add_label:
    runs-on: ubuntu-latest
    steps:
    - uses: actions-ecosystem/action-add-labels@v1
      with:
        labels: "Branch: Staging"
